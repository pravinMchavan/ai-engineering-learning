<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#222" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8f6ef" />
    <text x="40" y="24" font-size="26" font-family="Segoe UI, Arial, sans-serif" fill="#1c355e">Vectors from Scratch</text>

    <rect x="40" y="40" width="430" height="280" rx="18" fill="#fffdf8" stroke="#d5d0c2" />
    <text x="58" y="68" font-size="18" fill="#222">1. A vector on a 2D plane</text>
    
        <line x1="80" y1="270" x2="420" y2="270" stroke="#444" stroke-width="2" />
        <line x1="80" y1="270" x2="80" y2="70" stroke="#444" stroke-width="2" />
        <text x="425" y="276" font-size="14" fill="#333">x</text>
        <text x="72" y="66" font-size="14" fill="#333">y</text>
        <circle cx="80" cy="270" r="3" fill="#333" />
        <text x="52" y="288" font-size="12" fill="#333">O</text>
        
    
        <line x1="80" y1="270" x2="160" y2="150" stroke="#d1495b" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="168" y="142" font-size="14" fill="#d1495b">v = [2, 3]</text>
        

    <rect x="510" y="40" width="430" height="280" rx="18" fill="#fffdf8" stroke="#d5d0c2" />
    <text x="528" y="68" font-size="18" fill="#222">2. Vector addition</text>
    
        <line x1="550" y1="270" x2="890" y2="270" stroke="#444" stroke-width="2" />
        <line x1="550" y1="270" x2="550" y2="70" stroke="#444" stroke-width="2" />
        <text x="895" y="276" font-size="14" fill="#333">x</text>
        <text x="542" y="66" font-size="14" fill="#333">y</text>
        <circle cx="550" cy="270" r="3" fill="#333" />
        <text x="522" y="288" font-size="12" fill="#333">O</text>
        
    
        <line x1="550" y1="270" x2="630" y2="150" stroke="#00798c" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="638" y="142" font-size="14" fill="#00798c">v1 = [2, 3]</text>
        
    
        <line x1="550" y1="270" x2="710" y2="230" stroke="#edae49" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="718" y="222" font-size="14" fill="#edae49">v2 = [4, 1]</text>
        
    
        <line x1="630" y1="150" x2="790" y2="110" stroke="#edae49" stroke-width="4" marker-end="url(#arrowhead)" stroke-dasharray="8 6" />
        <text x="798" y="102" font-size="14" fill="#edae49">move v2 here</text>
        
    
        <line x1="550" y1="270" x2="790" y2="110" stroke="#2a9d8f" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="798" y="102" font-size="14" fill="#2a9d8f">v1 + v2 = [6, 4]</text>
        

    <rect x="40" y="380" width="430" height="280" rx="18" fill="#fffdf8" stroke="#d5d0c2" />
    <text x="58" y="408" font-size="18" fill="#222">3. Scalar multiplication</text>
    
        <line x1="80" y1="610" x2="420" y2="610" stroke="#444" stroke-width="2" />
        <line x1="80" y1="610" x2="80" y2="410" stroke="#444" stroke-width="2" />
        <text x="425" y="616" font-size="14" fill="#333">x</text>
        <text x="72" y="406" font-size="14" fill="#333">y</text>
        <circle cx="80" cy="610" r="3" fill="#333" />
        <text x="52" y="628" font-size="12" fill="#333">O</text>
        
    
        <line x1="80" y1="610" x2="160" y2="490" stroke="#3d5a80" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="168" y="482" font-size="14" fill="#3d5a80">v = [2, 3]</text>
        
    
        <line x1="80" y1="610" x2="240" y2="370" stroke="#ee6c4d" stroke-width="4" marker-end="url(#arrowhead)" />
        <text x="248" y="362" font-size="14" fill="#ee6c4d">2v = [4, 6]</text>
        

    <rect x="510" y="380" width="430" height="280" rx="18" fill="#fffdf8" stroke="#d5d0c2" />
    <text x="528" y="408" font-size="18" fill="#222">4. Dot product idea</text>
    <text x="528" y="442" font-size="16" fill="#222">v1 = [2, 3]</text>
    <text x="528" y="472" font-size="16" fill="#222">v2 = [4, 1]</text>
    <text x="528" y="512" font-size="18" fill="#b23a48">v1 . v2 = (2 x 4) + (3 x 1) = 11</text>
    <text x="528" y="554" font-size="16" fill="#222">Multiply matching values, then add.</text>
    <text x="528" y="584" font-size="16" fill="#222">A larger dot product often means stronger alignment.</text>
    <text x="528" y="624" font-size="14" fill="#666">File generated by 01-Vector.py</text>
    </svg>